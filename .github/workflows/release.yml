name: Release

# One tag → both platforms. Pushing a tag like v1.2026.1 builds the macOS .pkg and
# the Windows .exe, both stamped with the **tag version** (single source of truth),
# and publishes them to one GitHub Release. workflow_dispatch builds without
# publishing (verify secrets / smoke test).
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---- Single source of truth for the version -------------------------------
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      is_release: ${{ steps.v.outputs.is_release }}
    steps:
      - id: v
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          fi

  # ---- macOS: Developer ID + notarize + .pkg --------------------------------
  macos:
    needs: version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Rust targets (universal)
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Import Developer ID certificate
        env:
          CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/funput-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          # The p12 must contain BOTH "Developer ID Application" (signs the app) and
          # "Developer ID Installer" (signs the .pkg). productbuild/productsign need
          # key access too, hence the extra -T entries.
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/xcodebuild \
            -T /usr/bin/productbuild -T /usr/bin/productsign -T /usr/bin/pkgbuild
          security set-key-partition-list -S apple-tool:,apple:,codesign:,productsign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | sed 's/["[:space:]]//g')
          security default-keychain -s "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build, sign, notarize, package
        working-directory: platforms/macos
        env:
          VERSION: ${{ needs.version.outputs.version }}
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          TEAM_ID: ${{ secrets.NOTARY_TEAM_ID || 'RSARFZ5CD3' }}
        run: ./scripts/release.sh

      - name: Stage artifact
        working-directory: platforms/macos
        run: |
          OUT="$RUNNER_TEMP/out"; mkdir -p "$OUT"
          for f in build/release/Funput-*.pkg build/release/Funput-*.app.zip; do
            cp "$f" "$OUT/"
            shasum -a 256 "$f" | awk '{print $1}' > "$OUT/$(basename "$f").sha256"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: ${{ runner.temp }}/out/*

  # ---- Windows: shared UI + portable .exe -----------------------------------
  windows:
    needs: version
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Rust target
        run: rustup target add x86_64-pc-windows-msvc

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: platforms/windows/src-tauri -> target

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Stamp version from tag
        if: needs.version.outputs.version != ''
        run: |
          V="${{ needs.version.outputs.version }}"
          # App version (read by getVersion + embedded in the exe).
          node -e "const fs=require('fs');const f='platforms/windows/src-tauri/tauri.conf.json';const j=JSON.parse(fs.readFileSync(f));j.version=process.argv[1];fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n')" "$V"
          # Crate version so `cargo` logs + the package metadata match the tag too.
          node -e "const fs=require('fs');const f='platforms/windows/src-tauri/Cargo.toml';let s=fs.readFileSync(f,'utf8');s=s.replace(/^version = \".*\"/m,'version = \"'+process.argv[1]+'\"');fs.writeFileSync(f,s)" "$V"

      - name: Build shared UI
        run: |
          pnpm -C platforms/ui install --no-frozen-lockfile
          pnpm -C platforms/ui build

      - name: Build Funput.exe
        working-directory: platforms/windows/src-tauri
        run: cargo build --release

      - name: Stage artifact
        run: |
          V="${{ needs.version.outputs.version }}"; V="${V:-dev}"
          OUT="$RUNNER_TEMP/out"; mkdir -p "$OUT"
          cp platforms/windows/src-tauri/target/release/funput.exe "$OUT/Funput-$V.exe"
          sha256sum "$OUT/Funput-$V.exe" | awk '{print $1}' > "$OUT/Funput-$V.exe.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: ${{ runner.temp }}/out/*

  # ---- Linux: shared UI + Fcitx5 addon + Settings app → .deb ----------------
  linux:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          # Fcitx5 addon toolchain + JSON, and the Tauri (webkit2gtk) deps.
          sudo apt-get install -y \
            cmake fcitx5 libfcitx5core-dev libfcitx5utils-dev libfcitx5config-dev \
            nlohmann-json3-dev \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            platforms/linux/src-tauri -> target

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Stamp version from tag
        if: needs.version.outputs.version != ''
        run: |
          V="${{ needs.version.outputs.version }}"
          node -e "const fs=require('fs');const f='platforms/linux/src-tauri/tauri.conf.json';const j=JSON.parse(fs.readFileSync(f));j.version=process.argv[1];fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n')" "$V"
          node -e "const fs=require('fs');const f='platforms/linux/src-tauri/Cargo.toml';let s=fs.readFileSync(f,'utf8');s=s.replace(/^version = \".*\"/m,'version = \"'+process.argv[1]+'\"');fs.writeFileSync(f,s)" "$V"

      - name: Build shared UI
        run: |
          pnpm -C platforms/ui install --no-frozen-lockfile
          pnpm -C platforms/ui build

      - name: Build Settings app (Tauri)
        working-directory: platforms/linux/src-tauri
        run: cargo build --release

      - name: Build addon + .deb
        run: |
          V="${{ needs.version.outputs.version }}"; V="${V:-1.2026.1}"
          cmake -S platforms/linux/fcitx5 -B platforms/linux/build \
            -DCMAKE_BUILD_TYPE=Release -DFUNPUT_VERSION="$V"
          cmake --build platforms/linux/build --parallel
          ( cd platforms/linux/build && cpack -G DEB )

      - name: Stage artifact
        run: |
          OUT="$RUNNER_TEMP/out"; mkdir -p "$OUT"
          for f in platforms/linux/build/*.deb; do
            cp "$f" "$OUT/"
            sha256sum "$f" | awk '{print $1}' > "$OUT/$(basename "$f").sha256"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: ${{ runner.temp }}/out/*

  # ---- Publish one release with all artifacts -------------------------------
  publish:
    needs: [version, macos, windows, linux]
    if: needs.version.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble release notes
        run: |
          mkdir -p out
          cp artifacts/macos/* out/ 2>/dev/null || true
          cp artifacts/windows/* out/ 2>/dev/null || true
          cp artifacts/linux/* out/ 2>/dev/null || true
          ls -l out
          {
            echo "## Funput ${{ github.ref_name }}"
            echo
            echo "### macOS"
            echo "- \`Funput-*.pkg\` — **cách thường (có quyền admin):** double-click để cài (mở Installer.app), nhập mật khẩu. Đã ký Developer ID Installer + notarized, không bị Gatekeeper chặn."
            echo "- \`Funput-*.app.zip\` — **không có quyền admin:** giải nén, rồi kéo \`Funput.app\` vào \`~/Library/Input Methods\` (Finder → \`Cmd+Shift+G\` → gõ đường dẫn đó, tạo nếu chưa có). App đã notarized nên không bị chặn; không cần admin."
            echo "  Sau khi cài (cả hai cách): **System Settings → Keyboard → Input Sources → + → Vietnamese → Funput**. Chưa thấy thì log out/in một lần."
            echo "### Windows"
            echo "- \`Funput-*.exe\` — portable, double-click là chạy (nằm ở khay hệ thống). Cần WebView2 (có sẵn trên Win10/11)."
            echo "### Linux"
            echo "- \`funput_*_amd64.deb\` — \`sudo apt install ./funput_*_amd64.deb\` (Debian/Ubuntu, cần Fcitx5). Sau đó: \`fcitx5-configtool\` → thêm **Funput** vào danh sách input method. Mở **Funput** trong menu ứng dụng để chỉnh Telex/VNI."
            echo
            echo "### SHA-256"
            for f in out/*.sha256; do
              echo "- \`$(basename "${f%.sha256}")\`: \`$(cat "$f")\`"
            done
          } > notes.md

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            out/*.pkg
            out/*.app.zip
            out/*.exe
            out/*.deb
          body_path: notes.md
          generate_release_notes: true
