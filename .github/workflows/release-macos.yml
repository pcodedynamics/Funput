name: Release macOS

# Build → Developer ID sign → notarize → staple → DMG → GitHub Release.
# Pushing a tag like v1.2026.1 publishes a release; manual dispatch runs the whole
# pipeline (sign + notarize) without publishing — handy for verifying secrets.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write # create the GitHub Release

concurrency:
  group: release-macos-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Toolchain info
        run: |
          sw_vers
          xcodebuild -version

      - name: Rust targets (universal)
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Import Developer ID certificate
        env:
          CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/funput-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          # Add our keychain to the search list (keep the existing ones too) and
          # make it default so xcodebuild/codesign resolve the Developer ID identity.
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | sed 's/["[:space:]]//g')
          security default-keychain -s "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/cert.p12"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Build, sign, notarize, package
        working-directory: platforms/macos
        env:
          # Tag v1.2026.1 → DMG version 1.2026.1; dispatch falls back to MARKETING_VERSION.
          VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          TEAM_ID: ${{ secrets.NOTARY_TEAM_ID || 'RSARFZ5CD3' }}
        run: |
          # Strip a leading "v" from a tag-derived version.
          export VERSION="${VERSION#v}"
          ./scripts/release.sh

      - name: Checksum
        id: sum
        working-directory: platforms/macos
        run: |
          DMG="$(ls build/release/Funput-*.dmg)"
          echo "dmg=platforms/macos/$DMG" >> "$GITHUB_OUTPUT"
          echo "sha256=$(shasum -a 256 "$DMG" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.sum.outputs.dmg }}
          generate_release_notes: true
          body: |
            ## Funput ${{ github.ref_name }} — macOS

            Tải `Funput-*.dmg`, mở, rồi double-click **Install Funput.command**.
            Sau đó bật trong System Settings → Keyboard → Input Sources → + → Vietnamese → Funput.

            Đã ký Developer ID + notarized (Gatekeeper chấp nhận, không cảnh báo).

            **SHA-256:** `${{ steps.sum.outputs.sha256 }}`
